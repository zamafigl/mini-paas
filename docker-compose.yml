version: "3.9"

services:
  api:
    build: .
    container_name: mini-paas-api
    ports:
      - "8081:8081"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8081 --reload
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: mini-paas-postgres
    environment:
      POSTGRES_DB: mini_paas
      POSTGRES_USER: mini_paas
      POSTGRES_PASSWORD: mini_paas
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mini-paas-redis

volumes:
  postgres_data: